<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>WebConta — Balanza de Comprobación</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .period-bar { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .period-bar input[type=date] {
      background:var(--surface2); border:1.5px solid var(--border);
      border-radius:var(--r-md); color:var(--text); font-family:inherit;
      font-size:13px; padding:7px 10px; outline:none;
    }
    .balanza-wrap {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-xl); overflow:hidden; box-shadow:var(--shadow-xs);
    }
    .balanza-table { width:100%; border-collapse:collapse; font-size:13px; }

    .balanza-table thead tr.hdr1 th {
      background:var(--accent); color:#fff;
      padding:11px 14px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.6px; text-align:center;
    }
    .balanza-table thead tr.hdr1 th:first-child { text-align:left; }
    .balanza-table thead tr.hdr1 th:nth-child(2) { text-align:left; }

    .balanza-table thead tr.hdr2 th {
      background:var(--accent-bg); color:var(--accent);
      padding:7px 14px; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:.5px; text-align:right;
      border-bottom:2px solid var(--accent-mid);
    }
    .balanza-table thead tr.hdr2 th:first-child  { text-align:left; }
    .balanza-table thead tr.hdr2 th:nth-child(2) { text-align:left; }

    .balanza-table tbody tr { border-bottom:1px solid var(--border); }
    .balanza-table tbody tr:hover { background:var(--surface2); }
    .balanza-table tbody tr.sep td {
      background:var(--surface2); padding:5px 14px;
      font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:.6px; color:var(--text3);
    }

    .balanza-table td { padding:9px 14px; vertical-align:middle; }
    .c-cod  { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); width:75px; }
    .c-nom  { color:var(--text); font-weight:500; }
    .c-num  { font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; text-align:right; width:130px; }
    .c-debe { color:var(--green); }
    .c-hab  { color:var(--red); }
    .c-sd   { color:var(--blue); }
    .c-sa   { color:var(--orange); }
    .c-zero { color:var(--text3); font-weight:400; }

    .balanza-table tfoot td {
      padding:11px 14px; font-weight:700; font-size:13px;
      background:var(--accent); color:#fff; text-align:right;
      font-family:'JetBrains Mono',monospace;
    }
    .balanza-table tfoot td:first-child  { text-align:left; font-family:inherit; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
    .balanza-table tfoot td:nth-child(2) { text-align:left; }

    .verif-bar {
      display:flex; align-items:center; gap:20px; flex-wrap:wrap;
      padding:12px 18px; background:var(--surface2); border-top:1px solid var(--border);
      font-size:12px;
    }
    .v-item { display:flex; align-items:center; gap:6px; }
    .v-lbl  { color:var(--text3); }
    .v-val  { font-family:'JetBrains Mono',monospace; font-weight:700; }
    .v-ok   { background:var(--green-bg); color:var(--green); padding:2px 10px; border-radius:20px; font-weight:600; font-size:11px; }
    .v-bad  { background:var(--red-bg);   color:var(--red);   padding:2px 10px; border-radius:20px; font-weight:600; font-size:11px; }

    .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:20px; }
    .empty-state { padding:50px 20px; text-align:center; color:var(--text3); }
    .empty-state svg { width:44px; height:44px; margin-bottom:12px; opacity:.3; display:block; margin:0 auto 12px; }
    .empty-state p { font-size:14px; color:var(--text2); margin-bottom:16px; }
  </style>
</head>
<body>

<div id="sidebar-root"></div>
<div class="main-content">
  <div id="topbar-root"></div>
  <div class="page-body">

    <div class="period-bar">
      <span style="font-size:13px;color:var(--text3);">Del</span>
      <input type="date" id="f-ini"/>
      <span style="font-size:13px;color:var(--text3);">al</span>
      <input type="date" id="f-fin"/>
      <button class="btn btn-primary btn-sm" onclick="render()">↺ Actualizar</button>
      <button class="btn btn-sm" onclick="printWithHeader('Balanza de Comprobación','')">⎙ Exportar PDF</button>
      <span id="st-badge" style="margin-left:auto;"></span>
    </div>

    <div class="info-grid" id="info-grid"></div>
    <div class="balanza-wrap" id="balanza-wrap"></div>

  </div>
</div>

<script src="shared.js"></script>
<script>
  // ── Inyectar chrome ──
  document.getElementById('sidebar-root').innerHTML = renderSidebar();
  document.getElementById('topbar-root').innerHTML  = renderTopbar('Balanza de Comprobación');

  var TIPO_ORDEN = ['ACTIVO','PASIVO','CAPITAL','INGRESO','GASTO'];
  var TIPO_LABEL = {ACTIVO:'Activo',PASIVO:'Pasivo',CAPITAL:'Capital',INGRESO:'Ingreso',GASTO:'Gasto'};
  var TIPO_CLR   = {ACTIVO:'var(--activo)',PASIVO:'var(--pasivo)',CAPITAL:'var(--capital)',INGRESO:'var(--ingreso)',GASTO:'var(--gasto)'};
  var TIPO_ICON  = {ACTIVO:'🏦',PASIVO:'📋',CAPITAL:'💼',INGRESO:'📈',GASTO:'📉'};

  function fN(n){
    return (Math.abs(parseFloat(n)||0)).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function render(){
    var asientos = DB.getAsientos();
    var ini = document.getElementById('f-ini').value;
    var fin = document.getElementById('f-fin').value;
    if(ini) asientos = asientos.filter(function(a){ return a.fecha >= ini; });
    if(fin) asientos = asientos.filter(function(a){ return a.fecha <= fin; });

    var cuentas = DB.getCuentas();

    // Acumular debe/haber por cuentaId
    var mov = {};
    asientos.forEach(function(a){
      a.movimientos.forEach(function(m){
        if(!mov[m.cuentaId]) mov[m.cuentaId] = {debe:0, haber:0};
        if(m.tipo === 'DEBE') mov[m.cuentaId].debe  += parseFloat(m.monto)||0;
        else                  mov[m.cuentaId].haber += parseFloat(m.monto)||0;
      });
    });

    // Cuentas con movimiento
    var filas = cuentas.filter(function(c){ return mov[c.id]; }).map(function(c){
      var m  = mov[c.id];
      var diff = m.debe - m.haber;
      return {
        codigo: c.codigo, nombre: c.nombre, tipo: c.tipo,
        debe: m.debe, haber: m.haber,
        sd: diff > 0 ?  diff : 0,
        sa: diff < 0 ? -diff : 0
      };
    });

    // Totales
    var sumD=0, sumH=0, sumSD=0, sumSA=0;
    filas.forEach(function(f){ sumD+=f.debe; sumH+=f.haber; sumSD+=f.sd; sumSA+=f.sa; });

    // ── Vacío ──
    if(!filas.length){
      document.getElementById('info-grid').innerHTML = '';
      document.getElementById('st-badge').innerHTML  = '';
      document.getElementById('balanza-wrap').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><p>No hay movimientos en el período seleccionado.</p><a href="transacciones.html" class="btn btn-primary">+ Nueva transacción</a></div>';
      return;
    }

    var cuadra = Math.abs(sumD-sumH) < 0.01 && Math.abs(sumSD-sumSA) < 0.01;

    // ── Badge ──
    document.getElementById('st-badge').innerHTML = cuadra
      ? '<span style="background:var(--green-bg);color:var(--green);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;">✓ Balanza cuadrada</span>'
      : '<span style="background:var(--red-bg);color:var(--red);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;">✗ No cuadra — revisar</span>';

    // ── Info cards ──
    document.getElementById('info-grid').innerHTML =
      ['<div class="stat-card"><div class="s-label">Cuentas con movimiento</div><div class="s-value" style="color:var(--accent);">'+filas.length+'</div></div>',
       '<div class="stat-card"><div class="s-label">Total Debe</div><div class="s-value" style="color:var(--green);font-family:JetBrains Mono,monospace;font-size:17px;">$'+fN(sumD)+'</div></div>',
       '<div class="stat-card"><div class="s-label">Total Haber</div><div class="s-value" style="color:var(--red);font-family:JetBrains Mono,monospace;font-size:17px;">$'+fN(sumH)+'</div></div>',
       '<div class="stat-card"><div class="s-label">Saldo Deudor</div><div class="s-value" style="color:var(--blue);font-family:JetBrains Mono,monospace;font-size:17px;">$'+fN(sumSD)+'</div></div>',
       '<div class="stat-card"><div class="s-label">Saldo Acreedor</div><div class="s-value" style="color:var(--orange);font-family:JetBrains Mono,monospace;font-size:17px;">$'+fN(sumSA)+'</div></div>',
       '<div class="stat-card"><div class="s-label">Diferencia</div><div class="s-value" style="color:'+(cuadra?'var(--green)':'var(--red)')+';">$'+fN(Math.abs(sumD-sumH))+'</div><div class="s-sub">'+(cuadra?'Cuadra ✓':'Revisar')+'</div></div>'
      ].join('');

    // ── Tabla ──
    var tbody = '';
    TIPO_ORDEN.forEach(function(tipo){
      var rows = filas.filter(function(f){ return f.tipo===tipo; })
                      .sort(function(a,b){ return a.codigo.localeCompare(b.codigo,undefined,{numeric:true}); });
      if(!rows.length) return;
      tbody += '<tr class="sep"><td colspan="6">'+TIPO_ICON[tipo]+' '+TIPO_LABEL[tipo]+'</td></tr>';
      rows.forEach(function(r){
        tbody += '<tr>'
          + '<td class="c-cod">'+r.codigo+'</td>'
          + '<td class="c-nom">'+r.nombre+'</td>'
          + '<td class="c-num c-debe">'+( r.debe ? fN(r.debe) : '—' )+'</td>'
          + '<td class="c-num c-hab" >'+( r.haber? fN(r.haber): '—' )+'</td>'
          + '<td class="c-num c-sd"  >'+( r.sd   ? fN(r.sd)  : '—' )+'</td>'
          + '<td class="c-num c-sa"  >'+( r.sa   ? fN(r.sa)  : '—' )+'</td>'
          + '</tr>';
      });
    });

    var verif = '<div class="verif-bar">'
      + '<div class="v-item"><span class="v-lbl">Debe</span><span class="v-val" style="color:var(--green);">$'+fN(sumD)+'</span>'
      + '<span style="color:var(--text3);">=</span>'
      + '<span class="v-lbl">Haber</span><span class="v-val" style="color:var(--red);">$'+fN(sumH)+'</span>'
      + '<span class="'+(Math.abs(sumD-sumH)<0.01?'v-ok':'v-bad')+'">'+(Math.abs(sumD-sumH)<0.01?'✓ Iguales':'✗ Diferencia $'+fN(Math.abs(sumD-sumH)))+'</span></div>'
      + '<div style="width:1px;height:20px;background:var(--border);"></div>'
      + '<div class="v-item"><span class="v-lbl">Saldo Deudor</span><span class="v-val" style="color:var(--blue);">$'+fN(sumSD)+'</span>'
      + '<span style="color:var(--text3);">=</span>'
      + '<span class="v-lbl">Saldo Acreedor</span><span class="v-val" style="color:var(--orange);">$'+fN(sumSA)+'</span>'
      + '<span class="'+(Math.abs(sumSD-sumSA)<0.01?'v-ok':'v-bad')+'">'+(Math.abs(sumSD-sumSA)<0.01?'✓ Iguales':'✗ Diferencia $'+fN(Math.abs(sumSD-sumSA)))+'</span></div>'
      + '<span style="margin-left:auto;font-size:11px;color:var(--text3);">'+asientos.length+' asiento'+(asientos.length!==1?'s':'')+' · '+filas.length+' cuenta'+(filas.length!==1?'s':'')+'</span>'
      + '</div>';

    document.getElementById('balanza-wrap').innerHTML =
      '<table class="balanza-table">'
      + '<thead>'
      + '<tr class="hdr1"><th colspan="2">Cuenta</th><th colspan="2">Movimientos</th><th colspan="2">Saldos</th></tr>'
      + '<tr class="hdr2"><th>Código</th><th>Nombre</th><th>Debe</th><th>Haber</th><th>Saldo Deudor</th><th>Saldo Acreedor</th></tr>'
      + '</thead>'
      + '<tbody>'+tbody+'</tbody>'
      + '<tfoot><tr><td colspan="2">TOTALES</td><td>$'+fN(sumD)+'</td><td>$'+fN(sumH)+'</td><td>$'+fN(sumSD)+'</td><td>$'+fN(sumSA)+'</td></tr></tfoot>'
      + '</table>'
      + verif;
  }

  // Ejecutar render al cargar
  render();
</script>
</body>
</html>
