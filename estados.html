<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>WebConta — Resultado Integral</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .ef-wrap { max-width:820px; }
    .period-bar { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .period-bar input[type=date] { background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--r-md); color:var(--text); font-family:inherit; font-size:13px; padding:7px 10px; outline:none; }
    .period-bar input[type=date]:focus { border-color:var(--accent); }

    /* Secciones del estado */
    .ef-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-xl); overflow:hidden; margin-bottom:14px; box-shadow:var(--shadow-xs); }
    .ef-hdr { background:var(--surface2); border-bottom:1px solid var(--border); padding:9px 20px; display:flex; align-items:center; gap:8px; }
    .ef-hdr span { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.7px; color:var(--text2); }
    .ef-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    .ef-row { display:grid; grid-template-columns:1fr 160px; align-items:center; border-bottom:1px solid var(--border); min-height:42px; }
    .ef-row:last-child { border-bottom:none; }
    .ef-row.sub    { background:rgba(0,0,0,.02); }
    .ef-row.result { background:rgba(91,79,207,.07); }
    .ef-row.grand  { background:var(--green-bg); }
    .ef-row.neg-row{ background:var(--red-bg); }

    .ef-lbl { padding:8px 20px; font-size:13px; color:var(--text); display:flex; align-items:center; gap:7px; }
    .ef-lbl.in2  { padding-left:36px; font-size:12px; color:var(--text2); }
    .ef-lbl.bold { font-weight:600; }
    .ef-lbl.acc  { color:var(--accent); font-weight:700; }
    .ef-lbl.grn  { color:var(--green);  font-weight:700; }
    .ef-lbl.red  { color:var(--red);    font-weight:600; }
    .ef-lbl.org  { color:var(--orange); font-weight:600; }

    .ef-num { padding:8px 20px 8px 0; font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; text-align:right; }
    .ef-num.pos  { color:var(--green); }
    .ef-num.neg  { color:var(--red); }
    .ef-num.acc  { color:var(--accent); font-size:14px; font-weight:700; }
    .ef-num.grn  { color:var(--green);  font-size:14px; font-weight:700; }
    .ef-num.zero { color:var(--text3); font-weight:400; }

    .sign { font-size:10px; font-weight:700; padding:2px 5px; border-radius:3px; font-family:'JetBrains Mono',monospace; }
    .sm { background:var(--red-bg);   color:var(--red); }
    .sp { background:var(--green-bg); color:var(--green); }

    /* Expandible para Otros Ingresos / Otros Gastos */
    .expand-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 20px; cursor:pointer; border-bottom:1px solid var(--border);
      transition:background .12s; user-select:none;
    }
    .expand-hdr:hover { background:var(--surface2); }
    .expand-left  { display:flex; align-items:center; gap:10px; }
    .expand-bar   { width:4px; height:20px; border-radius:2px; flex-shrink:0; }
    .expand-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .expand-right { display:flex; align-items:center; gap:10px; }
    .expand-total { font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; }
    .expand-arrow { transition:transform .2s; font-size:14px; color:var(--text3); }
    .expand-arrow.open { transform:rotate(180deg); }
    .expand-body  { overflow:hidden; max-height:0; transition:max-height .25s ease; }
    .expand-body.open { max-height:1000px; }

    .banner { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:20px; }

    .zero-notice { background:var(--accent-bg); border:1.5px solid var(--accent-mid); border-radius:var(--r-lg); padding:10px 16px; font-size:12px; color:var(--accent); display:flex; align-items:center; gap:8px; margin-bottom:16px; }
  </style>
</head>
<body>
<div id="sidebar-root"></div>
<div class="main-content">
  <div id="topbar-root"></div>
  <div class="page-body">
    <div class="ef-wrap">

      <div class="period-bar">
        <span style="font-size:13px;color:var(--text3);">Período</span>
        <input type="date" id="f-ini" onchange="render()"/>
        <span style="font-size:13px;color:var(--text3);">al</span>
        <input type="date" id="f-fin" onchange="render()"/>
        <button class="btn btn-primary btn-sm" onclick="render()">↺ Actualizar</button>
        <button class="btn btn-sm" onclick="printWithHeader('Estado de Resultado Integral','Estado de Resultados')">⎙ Exportar PDF</button>
        <span style="font-size:12px;color:var(--text3);margin-left:auto;" id="p-info"></span>
      </div>

      <div class="zero-notice" id="zero-notice" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        No hay asientos en el período. Registra transacciones en el <a href="diario.html" style="color:var(--accent);font-weight:600;">Libro Diario</a>.
      </div>

      <div class="banner" id="banner"></div>
      <div id="ef-content"></div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
document.getElementById('sidebar-root').innerHTML = renderSidebar();
document.getElementById('topbar-root').innerHTML  = renderTopbar('Estado de Resultado Integral');

function fN(n){ return (Math.abs(n)||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function nc(n){ return n>0?'pos':n<0?'neg':'zero'; }

function efRow(label, val, opts={}){
  const lCls  = opts.lCls||'';
  const nCls  = opts.nCls||(opts.formula?'acc':nc(val));
  const sign  = opts.sign ? `<span class="sign ${opts.sign}">${opts.sign==='sm'?'−':'+'}</span> ` : '';
  const rCls  = opts.rCls||'';
  return `<div class="ef-row ${rCls}">
    <div class="ef-lbl ${lCls}">${sign}${label}</div>
    <div class="ef-num ${nCls}">${val===0&&!opts.z?'—':fN(val)}</div>
  </div>`;
}

function secHdr(label, color){
  return `<div class="ef-hdr"><div class="ef-dot" style="background:${color}"></div><span>${label}</span></div>`;
}

// ── Sección expandible Otros Ingresos / Otros Gastos ──
function expandSec(title, barColor, titleColor, items, total, totalCls, uid){
  const itemsHtml = items.map(([label,val])=>`
    <div class="ef-row">
      <div class="ef-lbl in2">${label}</div>
      <div class="ef-num ${nc(val)}">${fN(val)}</div>
    </div>`).join('');

  return `
  <div class="expand-hdr" onclick="toggleExpand('${uid}')">
    <div class="expand-left">
      <div class="expand-bar" style="background:${barColor}"></div>
      <span class="expand-title" style="color:${titleColor}">${title}</span>
    </div>
    <div class="expand-right">
      <span class="expand-total" style="color:${totalColor(total, titleColor)}">${fmt(total)}</span>
      <span class="expand-arrow" id="arr-${uid}">▼</span>
    </div>
  </div>
  <div class="expand-body" id="body-${uid}">
    ${itemsHtml || '<div class="ef-row"><div class="ef-lbl in2" style="color:var(--text3);">Sin registros</div><div class="ef-num zero">—</div></div>'}
  </div>`;
}

function totalColor(val, fallback){ return val>0?'var(--green)':val<0?'var(--red)':fallback; }

function toggleExpand(uid){
  const body = document.getElementById('body-'+uid);
  const arr  = document.getElementById('arr-'+uid);
  body.classList.toggle('open');
  arr.classList.toggle('open');
}

function render(){
  let asientos = DB.getAsientos();
  const ini = document.getElementById('f-ini').value;
  const fin = document.getElementById('f-fin').value;
  if(ini) asientos = asientos.filter(a=>a.fecha>=ini);
  if(fin) asientos = asientos.filter(a=>a.fecha<=fin);

  document.getElementById('p-info').textContent = asientos.length+' asiento'+(asientos.length!==1?'s':'')+' analizados';
  document.getElementById('zero-notice').style.display = asientos.length===0?'flex':'none';

  const S   = DB.getSaldosCuentas(asientos);
  const g   = cod => DB.getSaldo(S, cod);
  const all = DB.getCuentas();

  // Función para obtener saldo de cuentas con cierta clasificación
  function saldoPorClas(tipo, clas){
    return all.filter(c=>c.tipo===tipo && c.clasificacion===clas)
              .reduce((sum,c)=>{ const s=S[c.codigo]; return sum+(s?s.saldo:0); }, 0);
  }
  function itemsPorClas(tipo, clas){
    return all.filter(c=>c.tipo===tipo && c.clasificacion===clas && S[c.codigo] && S[c.codigo].saldo!==0)
              .map(c=>[c.nombre, S[c.codigo].saldo]);
  }

  // ── VENTAS (Ingreso Ordinario) ──
  const ventas     = g('4.1.01');
  const devVentas  = g('4.1.02');
  const rebVentas  = g('4.1.03');
  const descVentas = g('4.1.04');
  // También sumar cualquier cuenta de INGRESO con clas "Ingreso Ordinario"
  const otrosOrd   = saldoPorClas('INGRESO','Ingreso Ordinario');
  const ventasTot  = ventas || otrosOrd;
  const ventasNetas = ventasTot - devVentas - rebVentas - descVentas;

  // ── COSTO DE VENTAS ──
  const costoVentas = g('5.1.01') || saldoPorClas('GASTO','Costo de Ventas / Impuesto');
  const compras     = g('5.7.01') || saldoPorClas('GASTO','Compra');

  // ── UTILIDAD BRUTA ──
  const utilBruta = ventasNetas - (costoVentas > 0 ? costoVentas : compras);

  // ── GASTOS DE OPERACIÓN por clasificación ──
  // Gastos de Venta
  const gVentaItems = itemsPorClas('GASTO','Gasto de Venta');
  // Fallback a cuentas específicas si no hay clasificación
  if(!gVentaItems.length){
    if(g('5.2.02')) gVentaItems.push(['Gastos de Venta', g('5.2.02')]);
    if(g('5.4.02')) gVentaItems.push(['Fletes', g('5.4.02')]);
    if(g('5.6.01')) gVentaItems.push(['Publicidad', g('5.6.01')]);
    if(g('5.5.01')) gVentaItems.push(['Gasolina', g('5.5.01')]);
  }
  const totalGVenta = gVentaItems.reduce((s,[,v])=>s+v,0);

  // Gastos de Administración
  const gAdminItems = itemsPorClas('GASTO','Gasto de Administración');
  if(!gAdminItems.length){
    if(g('5.2.01')) gAdminItems.push(['Gastos de Administración', g('5.2.01')]);
    if(g('5.2.03')) gAdminItems.push(['Sueldos y Salarios', g('5.2.03')]);
    if(g('5.6.02')) gAdminItems.push(['Honorarios', g('5.6.02')]);
    if(g('5.2.04')) gAdminItems.push(['Renta', g('5.2.04')]);
    if(g('5.2.05')) gAdminItems.push(['Servicios', g('5.2.05')]);
  }
  const totalGAdmin = gAdminItems.reduce((s,[,v])=>s+v,0);
  const totalGOper  = totalGVenta + totalGAdmin;

  // ── UTILIDAD DE OPERACIÓN ──
  const utilOper = utilBruta - totalGOper;

  // ── OTROS INGRESOS (clas = "Otro Ingreso") ──
  const otrosIngItems = itemsPorClas('INGRESO','Otro Ingreso');
  // Fallback: productos financieros, rentas ganadas
  if(!otrosIngItems.length){
    if(g('4.2.01')) otrosIngItems.push(['Productos Financieros', g('4.2.01')]);
    if(g('4.3.01')) otrosIngItems.push(['Rentas Ganadas', g('4.3.01')]);
    if(g('4.4.01')) otrosIngItems.push(['Otros Ingresos', g('4.4.01')]);
  }
  const totalOtrosIng = otrosIngItems.reduce((s,[,v])=>s+v,0);

  // ── OTROS GASTOS (clas = "Otro Gasto") ──
  const otrosGtoItems = itemsPorClas('GASTO','Otro Gasto');
  if(!otrosGtoItems.length){
    if(g('5.3.01')) otrosGtoItems.push(['Gastos Financieros', g('5.3.01')]);
  }
  const totalOtrosGto = otrosGtoItems.reduce((s,[,v])=>s+v,0);

  // ── UTILIDAD ANTES DE IMPUESTOS ──
  const uai = utilOper + totalOtrosIng - totalOtrosGto;

  // ── IMPUESTOS ──
  const isr = g('5.4.01') || saldoPorClas('GASTO','Costo de Ventas / Impuesto')-costoVentas;
  const isrVal = g('5.4.01');

  // ── UTILIDAD NETA e INTEGRAL ──
  const utilNeta     = uai - isrVal;
  const utilIntegral = utilNeta;

  // ── Banner ──
  document.getElementById('banner').innerHTML = [
    {label:'Ventas netas',    val:ventasNetas, color:'var(--blue)'},
    {label:'Util. bruta',     val:utilBruta},
    {label:'Util. operación', val:utilOper},
    {label:'Util. neta',      val:utilNeta},
    {label:'Util. integral',  val:utilIntegral},
  ].map(c=>`<div class="stat-card">
    <div class="s-label">${c.label}</div>
    <div class="s-value ${c.val>=0?'pos':'neg'}" style="${c.color?'color:'+c.color:''}">${fmt(c.val)}</div>
  </div>`).join('');

  // ── Construir HTML ──
  let html = '';

  // VENTAS
  html += `<div class="ef-section">`;
  html += secHdr('Ingresos por ventas','var(--accent)');
  if(ventas||otrosOrd){
    const vLabel = ventas ? 'Ventas' : (all.find(c=>c.tipo==='INGRESO'&&c.clasificacion==='Ingreso Ordinario'&&S[c.codigo]?.saldo)?.nombre||'Ingresos ordinarios');
    html += efRow(vLabel, ventasTot, {z:true});
  } else {
    html += efRow('Ventas', 0, {z:true});
  }
  if(devVentas)  html += efRow('Devoluciones sobre ventas', devVentas, {sign:'sm',lCls:'in2'});
  if(rebVentas)  html += efRow('Rebajas sobre ventas',      rebVentas, {sign:'sm',lCls:'in2'});
  if(descVentas) html += efRow('Descuentos sobre ventas',   descVentas,{sign:'sm',lCls:'in2'});
  html += efRow('= Ventas netas', ventasNetas, {rCls:'result', lCls:'acc bold', nCls:'acc', z:true});
  html += `</div>`;

  // COSTO DE VENTAS
  const cvFinal = costoVentas > 0 ? costoVentas : compras;
  if(cvFinal){
    html += `<div class="ef-section">`;
    html += secHdr('Costo de ventas','var(--orange)');
    html += efRow(costoVentas?'Costo de ventas':'Compras', cvFinal, {lCls:'in2', nCls:'neg'});
    html += efRow('= Costo de ventas', cvFinal, {rCls:'result', lCls:'org bold', nCls:'neg', z:true});
    html += `</div>`;
  }

  // UTILIDAD BRUTA
  html += `<div class="ef-section"><div class="ef-row result" style="background:rgba(91,79,207,.1);">
    <div class="ef-lbl acc bold" style="font-size:14px;">= Utilidad bruta</div>
    <div class="ef-num ${nc(utilBruta)}" style="font-size:14px;font-weight:700;">${fN(utilBruta)}</div>
  </div></div>`;

  // GASTOS DE OPERACIÓN
  if(totalGOper){
    html += `<div class="ef-section">`;
    html += secHdr('Gastos de operación','var(--green)');
    if(totalGVenta){
      html += `<div class="ef-hdr" style="background:transparent;padding-left:26px;border-bottom:1px solid var(--border);"><span style="color:var(--green);font-size:12px;">▸ Gastos de venta</span></div>`;
      gVentaItems.forEach(([l,v])=>{ html+=efRow(l,v,{lCls:'in2',nCls:'neg'}); });
      html += efRow('= Total gastos de venta', totalGVenta, {rCls:'sub',lCls:'bold',nCls:'neg'});
    }
    if(totalGAdmin){
      html += `<div class="ef-hdr" style="background:transparent;padding-left:26px;border-bottom:1px solid var(--border);border-top:1px solid var(--border);"><span style="color:var(--green);font-size:12px;">▸ Gastos de administración</span></div>`;
      gAdminItems.forEach(([l,v])=>{ html+=efRow(l,v,{lCls:'in2',nCls:'neg'}); });
      html += efRow('= Total gastos de administración', totalGAdmin, {rCls:'sub',lCls:'bold',nCls:'neg'});
    }
    html += `<div class="ef-row result">
      <div class="ef-lbl acc bold" style="font-size:14px;">= Utilidad de operación</div>
      <div class="ef-num ${nc(utilOper)}" style="font-size:14px;font-weight:700;">${fN(utilOper)}</div>
    </div>`;
    html += `</div>`;
  } else {
    html += `<div class="ef-section"><div class="ef-row result">
      <div class="ef-lbl acc bold" style="font-size:14px;">= Utilidad de operación</div>
      <div class="ef-num ${nc(utilOper)}" style="font-size:14px;font-weight:700;">${fN(utilOper)}</div>
    </div></div>`;
  }

  // OTROS INGRESOS Y OTROS GASTOS (expandibles)
  if(totalOtrosIng || totalOtrosGto){
    html += `<div class="ef-section">`;
    if(totalOtrosIng){
      html += expandSec('Otros Ingresos','var(--green)','var(--green)', otrosIngItems, totalOtrosIng, 'pos', 'oing');
    }
    if(totalOtrosGto){
      html += expandSec('Otros Gastos','var(--red)','var(--red)', otrosGtoItems, totalOtrosGto, 'neg', 'ogto');
    }
    html += `</div>`;
  }

  // UTILIDAD ANTES DE IMPUESTOS
  html += `<div class="ef-section"><div class="ef-row result" style="background:rgba(91,79,207,.1);">
    <div class="ef-lbl acc bold" style="font-size:15px;">= Utilidad antes de impuestos</div>
    <div class="ef-num ${nc(uai)}" style="font-size:15px;font-weight:700;">${fN(uai)}</div>
  </div></div>`;

  // IMPUESTOS + UTILIDAD NETA
  if(isrVal){
    html += `<div class="ef-section">`;
    html += efRow('ISR / PTU', isrVal, {sign:'sm', lCls:'in2', nCls:'neg'});
    html += `<div class="ef-row result">
      <div class="ef-lbl acc bold" style="font-size:14px;">= Utilidad neta</div>
      <div class="ef-num ${nc(utilNeta)}" style="font-size:14px;font-weight:700;">${fN(utilNeta)}</div>
    </div></div>`;
  } else {
    html += `<div class="ef-section"><div class="ef-row result">
      <div class="ef-lbl acc bold" style="font-size:14px;">= Utilidad neta</div>
      <div class="ef-num ${nc(utilNeta)}" style="font-size:14px;font-weight:700;">${fN(utilNeta)}</div>
    </div></div>`;
  }

  // UTILIDAD INTEGRAL
  html += `<div class="ef-section"><div class="ef-row grand">
    <div class="ef-lbl grn" style="font-size:16px;font-weight:700;">= UTILIDAD INTEGRAL</div>
    <div class="ef-num grn" style="font-size:16px;">${fN(utilIntegral)}</div>
  </div></div>`;

  document.getElementById('ef-content').innerHTML = html;

  // Abrir expandibles si tienen datos
  if(totalOtrosIng) toggleExpand('oing');
  if(totalOtrosGto) toggleExpand('ogto');
}

render();
</script>
</body>
</html>
