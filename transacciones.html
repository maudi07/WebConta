<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanSys — Nueva Transacción</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .page-cols { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; }
    @media (max-width: 900px) { .page-cols { grid-template-columns: 1fr; } }
    .sticky-panel { position: sticky; top: 72px; }

    .add-mov-btn {
      width: 100%; padding: 12px;
      border: 1.5px dashed var(--border2); border-radius: var(--r-xl);
      background: transparent; color: var(--text3);
      font-family: inherit; font-size: 13px; cursor: pointer;
      transition: all .15s; display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    .add-mov-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-mid); }

    .quick-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; box-shadow: var(--shadow-xs); margin-bottom: 14px; }
    .quick-card-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .quick-card-title  { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; }
    .quick-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .quick-btn {
      padding: 9px 12px; background: transparent;
      border: 1px solid transparent; border-radius: var(--r-md);
      color: var(--text2); font-family: inherit; font-size: 12px;
      cursor: pointer; text-align: left; transition: all .12s; line-height: 1.5;
    }
    .quick-btn strong { color: var(--accent); font-weight: 600; display: block; font-size: 13px; margin-bottom: 1px; }
    .quick-btn:hover { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--text); }

    .tip-card { background: var(--accent-bg); border: 1.5px solid var(--accent-mid); border-radius: var(--r-xl); padding: 14px 16px; }
    .tip-card h4 { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .tip-card p  { font-size: 12px; color: var(--text2); line-height: 1.65; margin-bottom: 5px; }
    .tip-card p:last-child { margin: 0; }
  </style>
</head>
<body>

<div id="sidebar-root"></div>
<div class="main-content">
  <div id="topbar-root"></div>
  <div class="page-body">
    <div class="page-cols">

      <!-- ── Col izquierda ── -->
      <div>
        <div class="card mb-24">
          <div class="card-header"><span class="card-title">Datos del asiento</span></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label>Fecha *</label>
                <input type="date" id="tx-fecha" />
              </div>
              <div class="form-group mono">
                <label>Referencia</label>
                <input type="text" id="tx-ref" placeholder="Factura, cheque..." />
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Descripción / concepto *</label>
              <input type="text" id="tx-desc" placeholder="Ej. Venta de mercancía a cliente" />
            </div>
          </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <span style="font-size:14px;font-weight:600;">Movimientos contables</span>
          <span style="font-size:12px;color:var(--text3);" id="mov-counter">0 movimientos</span>
        </div>

        <div id="movimientos-container"></div>

        <button class="add-mov-btn" onclick="addMovimiento()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Agregar movimiento
        </button>

        <div class="balance-bar" style="margin-top:18px;" id="balance-bar">
          <div class="balance-side">
            <span class="balance-label">Debe</span>
            <span class="balance-val debe" id="total-debe">$0.00</span>
          </div>
          <div class="balance-status bad" id="balance-status">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>
            No cuadra
          </div>
          <div class="balance-side" style="text-align:right;">
            <span class="balance-label">Haber</span>
            <span class="balance-val haber" id="total-haber">$0.00</span>
          </div>
        </div>

        <div style="margin-top:14px;display:flex;gap:10px;">
          <button class="btn btn-success" onclick="guardarAsiento()" style="flex:1;justify-content:center;padding:11px;font-size:14px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Guardar transacción
          </button>
          <button class="btn btn-danger" onclick="limpiarTodo()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
            Limpiar
          </button>
        </div>
      </div>

      <!-- ── Col derecha ── -->
      <div class="sticky-panel">
        <div class="quick-card">
          <div class="quick-card-header"><span class="quick-card-title">Asientos rápidos</span></div>
          <div class="quick-list">
            <button class="quick-btn" onclick="quickEntry('venta-contado')"><strong>Venta de contado</strong>Caja ← Ventas</button>
            <button class="quick-btn" onclick="quickEntry('venta-credito')"><strong>Venta a crédito</strong>Clientes ← Ventas</button>
            <button class="quick-btn" onclick="quickEntry('compra-contado')"><strong>Compra de contado</strong>Compras ← Caja</button>
            <button class="quick-btn" onclick="quickEntry('compra-credito')"><strong>Compra a crédito</strong>Compras ← Proveedores</button>
            <button class="quick-btn" onclick="quickEntry('cobro-cliente')"><strong>Cobro a cliente</strong>Bancos ← Clientes</button>
            <button class="quick-btn" onclick="quickEntry('pago-proveedor')"><strong>Pago a proveedor</strong>Proveedores ← Bancos</button>
            <button class="quick-btn" onclick="quickEntry('nomina')"><strong>Pago de nómina</strong>Sueldos ← Bancos</button>
          </div>
        </div>
        <div class="tip-card">
          <h4>Partida doble</h4>
          <p><strong style="color:var(--green);">DEBE</strong> = <strong style="color:var(--red);">HABER</strong> — siempre.</p>
          <p>Cuentas <em>deudoras</em> aumentan en el Debe.<br>Cuentas <em>acreedoras</em> aumentan en el Haber.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  document.getElementById('sidebar-root').innerHTML = renderSidebar();
  document.getElementById('topbar-root').innerHTML  = renderTopbar('Nueva Transacción');
  document.getElementById('tx-fecha').value = new Date().toISOString().split('T')[0];

  let movCounter = 0;
  let movIds = [];

  /* ── Autocomplete helpers ── */
  function buildACData() {
    const cuentas = DB.getCuentas();
    const grupos = {};
    cuentas.forEach(c => {
      if (!grupos[c.tipo]) grupos[c.tipo] = [];
      grupos[c.tipo].push(c);
    });
    return { cuentas, grupos };
  }

  function makeAC(uid) {
    const wrapperId = uid + '-ac';
    const inputId   = uid + '-ac-input';
    const dropId    = uid + '-ac-drop';
    const hiddenId  = uid + '-cuenta';

    const { cuentas } = buildACData();
    let hiIdx = -1;
    let filtered = [...cuentas];

    function renderDrop(list) {
      const drop = document.getElementById(dropId);
      if (!list.length) { drop.classList.remove('open'); return; }
      const ORDEN = ['ACTIVO','PASIVO','CAPITAL','INGRESO','GASTO'];
      const grupos = {};
      list.forEach(c => { if (!grupos[c.tipo]) grupos[c.tipo] = []; grupos[c.tipo].push(c); });
      let html = '';
      ORDEN.forEach(t => {
        if (!grupos[t]) return;
        html += `<div class="ac-group-label">${t.charAt(0)+t.slice(1).toLowerCase()}</div>`;
        grupos[t].forEach((c,i) => {
          html += `<div class="ac-option" data-id="${c.id}" data-name="${c.nombre}">
            <div class="tipo-dot dot-${c.tipo.toLowerCase()}"></div>
            <span class="ac-name">${c.nombre}</span>
            <span class="nat-pill nat-${c.naturaleza.toLowerCase()} ac-tipo">${c.naturaleza}</span>
          </div>`;
        });
      });
      drop.innerHTML = html;
      drop.classList.add('open');
      hiIdx = -1;

      drop.querySelectorAll('.ac-option').forEach(opt => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          selectCuenta(opt.dataset.id, opt.dataset.name);
        });
      });
    }

    function selectCuenta(id, name) {
      document.getElementById(hiddenId).value    = id;
      document.getElementById(inputId).value     = name;
      document.getElementById(dropId).classList.remove('open');
      recalc();
    }

    const input = document.getElementById(inputId);
    input.addEventListener('input', () => {
      const q = input.value.toLowerCase();
      filtered = q ? cuentas.filter(c => c.nombre.toLowerCase().includes(q) || c.codigo.includes(q)) : cuentas;
      document.getElementById(hiddenId).value = '';
      renderDrop(filtered);
    });
    input.addEventListener('focus', () => { filtered = cuentas; renderDrop(filtered); });
    input.addEventListener('blur',  () => { setTimeout(() => document.getElementById(dropId)?.classList.remove('open'), 150); });
    input.addEventListener('keydown', e => {
      const opts = document.getElementById(dropId).querySelectorAll('.ac-option');
      if (!opts.length) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); hiIdx = Math.min(hiIdx+1, opts.length-1); opts.forEach((o,i) => o.classList.toggle('highlighted', i===hiIdx)); opts[hiIdx]?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); hiIdx = Math.max(hiIdx-1, 0); opts.forEach((o,i) => o.classList.toggle('highlighted', i===hiIdx)); opts[hiIdx]?.scrollIntoView({block:'nearest'}); }
      else if (e.key === 'Enter' && hiIdx >= 0) { e.preventDefault(); const opt = opts[hiIdx]; selectCuenta(opt.dataset.id, opt.dataset.name); }
      else if (e.key === 'Escape') { document.getElementById(dropId).classList.remove('open'); }
    });
  }

  /* ── Agregar movimiento ── */
  function addMovimiento(opts = {}) {
    movCounter++;
    const uid = 'mov' + Date.now() + movCounter;
    movIds.push(uid);

    const block = document.createElement('div');
    block.className = 'movimiento-block';
    block.id = uid;
    block.innerHTML = `
      <div class="movimiento-header">
        <span class="movimiento-num">Movimiento ${movIds.length}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="dh-toggle">
            <button class="dh-btn debe ${opts.tipo!=='HABER'?'active':''}" onclick="setDH('${uid}','DEBE')">DEBE</button>
            <button class="dh-btn haber ${opts.tipo==='HABER'?'active':''}" onclick="setDH('${uid}','HABER')">HABER</button>
          </div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:10px;">
        <label>Cuenta</label>
        <div class="cuenta-autocomplete" id="${uid}-ac">
          <input class="cuenta-ac-input" id="${uid}-ac-input" placeholder="Buscar cuenta..." autocomplete="off" />
          <div class="cuenta-ac-dropdown" id="${uid}-ac-drop"></div>
        </div>
        <input type="hidden" id="${uid}-cuenta" />
      </div>
      <div class="form-group mono" style="margin-bottom:0;">
        <label>Monto</label>
        <div class="monto-input-wrap">
          <span class="currency-sym">$</span>
          <input type="number" id="${uid}-monto" placeholder="0.00" min="0" step="0.01"
            value="${opts.monto||''}" oninput="recalc()"
            style="width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-md);color:var(--text);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" />
        </div>
      </div>`;

    document.getElementById('movimientos-container').appendChild(block);

    // Pre-seleccionar cuenta si viene de quick entry
    if (opts.cuentaId) {
      const c = DB.getCuentaById(opts.cuentaId);
      if (c) {
        document.getElementById(uid+'-cuenta').value   = c.id;
        document.getElementById(uid+'-ac-input').value = c.nombre;
      }
    }

    makeAC(uid);
    updateMovCounters();
    recalc();
  }

  function setDH(uid, tipo) {
    const b = document.getElementById(uid);
    if (!b) return;
    b.querySelector('.dh-btn.debe').classList.toggle('active',  tipo==='DEBE');
    b.querySelector('.dh-btn.haber').classList.toggle('active', tipo==='HABER');
    recalc();
  }

  function getMovTipo(uid) {
    return document.getElementById(uid)?.querySelector('.dh-btn.active')?.classList.contains('haber') ? 'HABER' : 'DEBE';
  }

  function updateMovCounters() {
    document.getElementById('mov-counter').textContent = movIds.length + ' movimiento' + (movIds.length!==1?'s':'');
    movIds.forEach((uid,i) => {
      const n = document.querySelector(`#${uid} .movimiento-num`);
      if (n) n.textContent = 'Movimiento ' + (i+1);
    });
  }

  function recalc() {
    let debe = 0, haber = 0;
    movIds.forEach(uid => {
      const tipo  = getMovTipo(uid);
      const monto = parseFloat(document.getElementById(uid+'-monto')?.value)||0;
      tipo==='DEBE' ? (debe+=monto) : (haber+=monto);
    });
    document.getElementById('total-debe').textContent  = fmt(debe);
    document.getElementById('total-haber').textContent = fmt(haber);
    const ok = debe > 0 && Math.abs(debe-haber) < 0.001;
    const st = document.getElementById('balance-status');
    if (ok) {
      st.className = 'balance-status ok';
      st.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Cuadra ✓`;
    } else {
      const d = Math.abs(debe-haber);
      st.className = 'balance-status bad';
      st.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>${d>0.001?'Dif: '+fmt(d):'No cuadra'}`;
    }
    return ok;
  }

  function guardarAsiento() {
    const desc  = document.getElementById('tx-desc').value.trim();
    const fecha = document.getElementById('tx-fecha').value;
    const ref   = document.getElementById('tx-ref').value.trim();
    if (!desc)  { showToast('Agrega una descripción', 'error'); return; }
    if (!fecha) { showToast('Selecciona la fecha', 'error'); return; }
    if (!recalc()) { showToast('El asiento no cuadra (Debe ≠ Haber)', 'error'); return; }

    const movimientos = movIds.map(uid => {
      const cId   = document.getElementById(uid+'-cuenta')?.value;
      const monto = parseFloat(document.getElementById(uid+'-monto')?.value)||0;
      const tipo  = getMovTipo(uid);
      const c     = DB.getCuentaById(cId);
      return { tipo, cuentaId: cId||'', cuentaNombre: c?c.nombre:'(sin cuenta)', monto };
    }).filter(m => m.monto > 0);

    if (movimientos.some(m => !m.cuentaId)) { showToast('Asigna una cuenta a todos los movimientos', 'error'); return; }
    DB.addAsiento({descripcion:desc, fecha, referencia:ref, movimientos});
    showToast('Transacción guardada ✓', 'success');
    limpiarTodo();
    setTimeout(() => { window.location.href = 'diario.html'; }, 1100);
  }

  function limpiarTodo() {
    document.getElementById('tx-desc').value  = '';
    document.getElementById('tx-ref').value   = '';
    document.getElementById('tx-fecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('movimientos-container').innerHTML = '';
    movIds = []; movCounter = 0;
    addMovimiento({tipo:'DEBE'});
    addMovimiento({tipo:'HABER'});
  }

  function getCuentaIdByCodigo(partial) {
    return DB.getCuentas().find(c => c.codigo.startsWith(partial)||c.nombre.toLowerCase().includes(partial.toLowerCase()))?.id||'';
  }

  const QUICK = {
    'venta-contado':  {desc:'Venta de mercancía de contado',   movs:[{tipo:'DEBE',clave:'1.1.01'},{tipo:'HABER',clave:'4.1.01'}]},
    'venta-credito':  {desc:'Venta de mercancía a crédito',     movs:[{tipo:'DEBE',clave:'1.1.03'},{tipo:'HABER',clave:'4.1.01'}]},
    'compra-contado': {desc:'Compra de mercancía de contado',   movs:[{tipo:'DEBE',clave:'5.7.01'},{tipo:'HABER',clave:'1.1.01'}]},
    'compra-credito': {desc:'Compra de mercancía a crédito',    movs:[{tipo:'DEBE',clave:'5.7.01'},{tipo:'HABER',clave:'2.1.01'}]},
    'cobro-cliente':  {desc:'Cobro a cliente',                  movs:[{tipo:'DEBE',clave:'1.1.02'},{tipo:'HABER',clave:'1.1.03'}]},
    'pago-proveedor': {desc:'Pago a proveedor',                 movs:[{tipo:'DEBE',clave:'2.1.01'},{tipo:'HABER',clave:'1.1.02'}]},
    'nomina':         {desc:'Pago de nómina',                   movs:[{tipo:'DEBE',clave:'5.2.03'},{tipo:'HABER',clave:'1.1.02'}]},
  };

  function quickEntry(key) {
    const e = QUICK[key]; if (!e) return;
    document.getElementById('tx-desc').value = e.desc;
    document.getElementById('movimientos-container').innerHTML = '';
    movIds=[]; movCounter=0;
    e.movs.forEach(m => addMovimiento({tipo:m.tipo, cuentaId:getCuentaIdByCodigo(m.clave)}));
  }

  addMovimiento({tipo:'DEBE'});
  addMovimiento({tipo:'HABER'});
</script>
</body>
</html>
