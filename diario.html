<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebConta — Libro Diario</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="sidebar-root"></div>
<div class="main-content">
  <div id="topbar-root"></div>
  <div class="page-body">

    <div class="card mb-24">
      <div class="card-body" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:14px 20px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Buscar descripción, referencia..." />
          </div>
          <input type="date" id="f-desde" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;" />
          <input type="date" id="f-hasta" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);color:var(--text);font-family:inherit;font-size:13px;padding:7px 10px;outline:none;" />
          <button class="btn btn-sm" onclick="clearF()">Limpiar</button>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" onclick="printWithHeader('Libro Diario','')">⎙ Exportar PDF</button>
          <a href="transacciones.html" class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva transacción
          </a>
        </div>
      </div>
    </div>

    <div class="stats-grid" id="resumen" style="margin-bottom:18px;"></div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:12px;" id="counter"></div>
    <div id="asientos-list"></div>

  </div>
</div>

<div class="modal-overlay" id="modal-delete">
  <div class="modal" style="max-width:370px;">
    <div class="modal-header"><span class="modal-title">¿Eliminar asiento?</span></div>
    <div class="modal-body"><p style="font-size:14px;color:var(--text2);line-height:1.7;">El asiento <strong id="del-id"></strong> será eliminado permanentemente.</p></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-delete')">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmDel()">Eliminar</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  document.getElementById('sidebar-root').innerHTML = renderSidebar();
  document.getElementById('topbar-root').innerHTML  = renderTopbar('Libro Diario');
  let delId = null;

  function render() {
    let list = DB.getAsientos();
    const q = document.getElementById('search-input').value.toLowerCase();
    const d = document.getElementById('f-desde').value;
    const h = document.getElementById('f-hasta').value;
    if (q) list = list.filter(a => a.descripcion.toLowerCase().includes(q)||(a.referencia||'').toLowerCase().includes(q)||a.id.toLowerCase().includes(q));
    if (d) list = list.filter(a => a.fecha >= d);
    if (h) list = list.filter(a => a.fecha <= h);

    const tD = list.reduce((s,a)=>s+a.movimientos.filter(m=>m.tipo==='DEBE').reduce((ss,m)=>ss+(parseFloat(m.monto)||0),0),0);
    const tH = list.reduce((s,a)=>s+a.movimientos.filter(m=>m.tipo==='HABER').reduce((ss,m)=>ss+(parseFloat(m.monto)||0),0),0);
    const diff = Math.abs(tD-tH);

    document.getElementById('resumen').innerHTML = `
      <div class="stat-card"><div class="s-label">Asientos</div><div class="s-value" style="color:var(--accent);">${list.length}</div></div>
      <div class="stat-card"><div class="s-label">Total Debe</div><div class="s-value pos">${fmt(tD)}</div></div>
      <div class="stat-card"><div class="s-label">Total Haber</div><div class="s-value neg">${fmt(tH)}</div></div>
      <div class="stat-card"><div class="s-label">Diferencia</div><div class="s-value ${diff<0.01?'pos':'neg'}">${fmt(diff)}</div><div class="s-sub">${diff<0.01?'Balanceado':'Revisar'}</div></div>
    `;
    document.getElementById('counter').textContent = list.length + ' asiento' + (list.length!==1?'s':'');

    const el = document.getElementById('asientos-list');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No hay asientos</p><a href="transacciones.html" class="btn btn-primary">Registrar primera transacción</a></div>`;
      return;
    }
    el.innerHTML = list.map(a => {
      const tot = a.movimientos.filter(m=>m.tipo==='DEBE').reduce((s,m)=>s+(parseFloat(m.monto)||0),0);
      const rows = a.movimientos.map(m=>`
        <div class="asiento-mov-row">
          <span class="dh-label ${m.tipo==='DEBE'?'dh-debe':'dh-haber'}">${m.tipo}</span>
          <span class="asiento-mov-cuenta">${m.cuentaNombre||'—'}</span>
          <span class="asiento-mov-monto" style="color:${m.tipo==='DEBE'?'var(--green)':'var(--red)'};">${fmt(m.monto)}</span>
        </div>`).join('');
      return `<div class="asiento-card">
        <div class="asiento-header">
          <span class="asiento-id">${a.id}</span>
          <span class="asiento-desc">${a.descripcion}</span>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
            ${a.referencia?`<span class="asiento-ref">${a.referencia}</span>`:''}
            <span class="asiento-date">${fmtFecha(a.fecha)}</span>
            <button class="btn btn-icon del" onclick="askDel('${a.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </div>
        <div class="asiento-movs">${rows}</div>
        <div class="asiento-footer">
          <span class="asiento-total">${a.movimientos.length} movimiento${a.movimientos.length!==1?'s':''}</span>
          <span class="badge badge-info mono">${fmt(tot)}</span>
        </div>
      </div>`;
    }).join('');
  }

  function askDel(id) { delId=id; document.getElementById('del-id').textContent=id; openModal('modal-delete'); }
  function confirmDel() { DB.deleteAsiento(delId); delId=null; closeModal('modal-delete'); render(); showToast('Asiento eliminado','info'); }
  function clearF() { document.getElementById('search-input').value=''; document.getElementById('f-desde').value=''; document.getElementById('f-hasta').value=''; render(); }
  function openModal(id)  { document.getElementById(id).classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }
  document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
  ['search-input','f-desde','f-hasta'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  render();
</script>
</body>
</html>
